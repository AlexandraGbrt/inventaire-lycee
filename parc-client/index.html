<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion Inventaire | Lycée</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/scss/main.scss" />
</head>
<body>
  
  <header class="main-header">
    <div class="container">
      <h1>Inventaire <span> Parc Informatique</span> du Lycée</h1>
      <nav class="nav-filters">
        <button class="btn-tab active" data-type="imprimantes">Imprimantes</button>
        <button class="btn-tab" data-type="pc-fixes">PC Fixes</button>
        <button class="btn-tab" data-type="portables/dispo">Portables</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="table-header">
      <h2 id="table-title">Liste du matériel</h2>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Filtrer par salle ou modèle...">
      </div>
    </div>

    <div class="table-responsive">
      <table id="inventory-table">
        <thead>
          <tr id="table-head-row">
            </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="100%" class="loading">Chargement des données...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="main-footer">
    <div class="container">
      <p>&copy; 2026 - Outil d'Administration Système</p>
    </div>
  </footer>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
